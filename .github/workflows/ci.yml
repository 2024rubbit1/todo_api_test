name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false  # 一个版本失败不影响其他版本继续测试
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'  # 自动缓存 pip 依赖
    - name: 安装 Docker Compose（如果必要）
      run: |
        docker compose version  # 新版 Docker 用这个命令
        # 如果上面失败，再安装传统 docker-compose
        if ! command -v docker-compose &> /dev/null; then
          sudo apt-get update
          sudo apt-get install -y docker-compose
        fi

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip list  # 打印已安装的包，便于调试
    - name: launch Docker
      run: |
        docker-compose up -d
        # 等待服务就绪
        sleep 10

    - name: Run tests
      run: |
        pytest tests/ --html=reports/report-python-${{ matrix.python-version }}.html \
            --self-contained-html \
            -v

    - name: Upload test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-report-python-${{ matrix.python-version }}
        path: reports/report-python-${{ matrix.python-version }}.html
    - name: stop Docker service
      if: always()
      run: docker-compose down